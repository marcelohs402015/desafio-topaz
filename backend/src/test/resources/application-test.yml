spring:
  datasource:
    url: jdbc:h2:mem:topaztest;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  base-url: http://localhost:8080
  security:
    username: admin
    password: admin

management:
  endpoints:
    web:
      exposure:
        include: health

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: topaz
      POSTGRES_USER: topaz
      POSTGRES_PASSWORD: topaz
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U topaz -d topaz"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/topaz
      SPRING_DATASOURCE_USERNAME: topaz
      SPRING_DATASOURCE_PASSWORD: topaz
      APP_BASE_URL: http://localhost:8080
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8080
    ports:
      - "5173:80"
    depends_on:
      - backend
